openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WFoods ComandaFácil API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Restaurant/tenant management
  - name: auth
    description: Authentication
  - name: categories
    description: Menu categories
  - name: products
    description: Menu products
  - name: tables
    description: Restaurant tables
  - name: orders
    description: Order management
  - name: payments
    description: Payment management
  - name: dashboard
    description: Dashboard analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/waiter/login:
    post:
      operationId: waiterLogin
      tags: [auth]
      summary: Waiter login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaiterLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # Tenants
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants (super-admin)
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant/restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant by ID
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Not found
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories for current tenant
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{categoryId}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products for current tenant
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: available
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Public menu (no auth)
  /menu/{tenantSlug}:
    get:
      operationId: getPublicMenu
      tags: [products]
      summary: Get public menu for a restaurant by slug
      parameters:
        - name: tenantSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public menu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicMenu"
        "404":
          description: Restaurant not found

  # Tables
  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List tables for current tenant
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableBody"
      responses:
        "201":
          description: Table created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/{tableId}:
    patch:
      operationId: updateTable
      tags: [tables]
      summary: Update table
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTableBody"
      responses:
        "200":
          description: Table updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete table
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for current tenant
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: ["novo", "preparando", "pronto", "finalizado", null]
        - name: tableId
          in: query
          schema:
            type: ["integer", "null"]
        - name: date
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order (client or waiter)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # Payments
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments for current tenant
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Register a payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # Dashboard / Analytics
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for today
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/orders-by-status:
    get:
      operationId: getOrdersByStatus
      tags: [dashboard]
      summary: Get current active orders grouped by status
      responses:
        "200":
          description: Orders by status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersByStatus"

  # Waiters
  /waiters:
    get:
      operationId: listWaiters
      tags: [auth]
      summary: List waiters for current tenant
      responses:
        "200":
          description: List of waiters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Waiter"
    post:
      operationId: createWaiter
      tags: [auth]
      summary: Create a waiter for current tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWaiterBody"
      responses:
        "201":
          description: Waiter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Waiter"

  /waiters/{waiterId}:
    delete:
      operationId: deleteWaiter
      tags: [auth]
      summary: Delete waiter
      parameters:
        - name: waiterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AdminLoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        tenantSlug:
          type: string
      required:
        - email
        - password
        - tenantSlug

    WaiterLoginBody:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
        tenantSlug:
          type: string
      required:
        - name
        - password
        - tenantSlug

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/CurrentUser"
      required:
        - token
        - user

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, waiter]
        tenantId:
          type: integer
        tenantSlug:
          type: string
        tenantName:
          type: string
      required:
        - id
        - name
        - role
        - tenantId
        - tenantSlug
        - tenantName

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - active
        - createdAt

    CreateTenantBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        adminEmail:
          type: string
        adminPassword:
          type: string
      required:
        - name
        - slug
        - adminEmail
        - adminPassword

    UpdateTenantBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        active:
          type: ["boolean", "null"]

    Category:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - tenantId
        - name
        - sortOrder
        - createdAt

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - name

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        sortOrder:
          type: ["integer", "null"]

    Product:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        categoryId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        available:
          type: boolean
        printSector:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - tenantId
        - name
        - price
        - available
        - createdAt

    CreateProductBody:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        available:
          type: boolean
        printSector:
          type: ["string", "null"]
      required:
        - name
        - price

    UpdateProductBody:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        available:
          type: ["boolean", "null"]
        printSector:
          type: ["string", "null"]

    PublicMenu:
      type: object
      properties:
        tenant:
          $ref: "#/components/schemas/Tenant"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - tenant
        - categories
        - products

    Table:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        number:
          type: integer
        label:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - tenantId
        - number
        - active
        - createdAt

    CreateTableBody:
      type: object
      properties:
        number:
          type: integer
        label:
          type: ["string", "null"]
      required:
        - number

    UpdateTableBody:
      type: object
      properties:
        number:
          type: ["integer", "null"]
        label:
          type: ["string", "null"]
        active:
          type: ["boolean", "null"]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        notes:
          type: ["string", "null"]
        printSector:
          type: ["string", "null"]
      required:
        - id
        - orderId
        - productId
        - productName
        - quantity
        - unitPrice

    Order:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        tableId:
          type: ["integer", "null"]
        tableNumber:
          type: ["integer", "null"]
        waiterId:
          type: ["integer", "null"]
        waiterName:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        status:
          type: string
          enum: [novo, preparando, pronto, finalizado]
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - tenantId
        - status
        - total
        - items
        - createdAt
        - updatedAt

    CreateOrderBody:
      type: object
      properties:
        tenantSlug:
          type: string
        tableId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderItemBody"
      required:
        - tenantSlug
        - items

    CreateOrderItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        notes:
          type: ["string", "null"]
      required:
        - productId
        - quantity

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [novo, preparando, pronto, finalizado]
      required:
        - status

    Payment:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        orderId:
          type: integer
        amount:
          type: number
        method:
          type: string
          enum: [dinheiro, pix, cartao]
        createdAt:
          type: string
      required:
        - id
        - tenantId
        - orderId
        - amount
        - method
        - createdAt

    CreatePaymentBody:
      type: object
      properties:
        orderId:
          type: integer
        amount:
          type: number
        method:
          type: string
          enum: [dinheiro, pix, cartao]
      required:
        - orderId
        - amount
        - method

    DashboardSummary:
      type: object
      properties:
        totalOrdersToday:
          type: integer
        totalRevenueToday:
          type: number
        activeOrders:
          type: integer
        ordersByStatus:
          $ref: "#/components/schemas/OrdersByStatus"
        revenueByMethod:
          type: object
          properties:
            dinheiro:
              type: number
            pix:
              type: number
            cartao:
              type: number
          required:
            - dinheiro
            - pix
            - cartao
      required:
        - totalOrdersToday
        - totalRevenueToday
        - activeOrders
        - ordersByStatus
        - revenueByMethod

    OrdersByStatus:
      type: object
      properties:
        novo:
          type: integer
        preparando:
          type: integer
        pronto:
          type: integer
        finalizado:
          type: integer
      required:
        - novo
        - preparando
        - pronto
        - finalizado

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalSold:
          type: integer
        totalRevenue:
          type: number
      required:
        - productId
        - productName
        - totalSold
        - totalRevenue

    Waiter:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
      required:
        - id
        - tenantId
        - name
        - createdAt

    CreateWaiterBody:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
      required:
        - name
        - password
